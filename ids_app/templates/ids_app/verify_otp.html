{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP</title>
    <link rel="stylesheet" href="{% static 'ids_app/styles.css' %}">
    <style>
        .title {
            color: #ff7e5f;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            font-family: 'Georgia', serif;
            animation: titleAnimation 2s ease-in-out;
        }
        @keyframes titleAnimation {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        button {
            font-family: 'Arial', sans-serif;
            font-size: 1.2em;
            background-color: #6a11cb;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            cursor: pointer;
            animation: buttonAnimation 1s ease-in-out infinite alternate;
        }
        @keyframes buttonAnimation {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        button:hover {
            background-color: #2575fc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Verify OTP</h1>
        <form method="post" action="{% url 'verify_otp' %}">
            {% csrf_token %}
            <label for="otp">Enter OTP:</label>
            <input type="text" id="otp" name="otp" required>
            <br>
            <button type="submit">Verify</button>
        </form>
        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
